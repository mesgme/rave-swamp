name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  cve-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x
      - name: Scan dependencies for CVEs
        run: |
          python3 - <<'PYEOF'
          import json
          with open('deno.lock') as f:
            lock = json.load(f)
          pkgs = []
          for key in lock.get('npm', {}):
            at = key.rfind('@')
            name, version = key[:at], key[at + 1:]
            pkgs.append({'package': {'name': name, 'version': version, 'ecosystem': 'npm'}})
          manifest = {'results': [{'packages': pkgs}]}
          with open('/tmp/osv-scan.json', 'w') as f:
            json.dump(manifest, f)
          print('Scanning npm packages:', [p['package']['name'] + '@' + p['package']['version'] for p in pkgs])
          PYEOF

          curl -fsSL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner scan -L osv-scanner:/tmp/osv-scan.json

  swamp-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install swamp
        run: curl -fsSL swamp.club/install.sh | sh
      - name: Add swamp to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Validate extension models
        run: swamp model validate --json

  swamp-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install swamp
        run: curl -fsSL swamp.club/install.sh | sh
      - name: Add swamp to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Validate workflows
        run: swamp workflow validate --json

  lock-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x
      - name: Verify lock file is current
        run: |
          deno cache extensions/models/*.ts
          if [ -n "$(git status --porcelain deno.lock)" ]; then
            echo "ERROR: deno.lock is missing or stale. Run: deno cache extensions/models/*.ts && git add deno.lock && git commit" >&2
            exit 1
          fi
          echo "deno.lock is committed and current."

  npm-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Check npm imports are version-pinned
        run: |
          if grep -rP 'from\s+"npm:(?!zod@)[^@"]+(?<![0-9])"' extensions/models/*.ts; then
            echo "ERROR: found unpinned npm: import — add @<version> to each npm: specifier" >&2
            exit 1
          fi
          echo "All npm: imports are version-pinned."

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x
      - name: TypeScript compile check
        run: deno check extensions/models/*.ts

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x
      - name: Lint extension models
        run: deno lint extensions/models/*.ts

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x
      - name: Unit tests
        run: deno test extensions/models/

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x
      - name: Code coverage
        run: deno test --coverage=cov_profile extensions/models/ && (deno coverage cov_profile --detailed || true)

  dashboard-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x
      - name: Dashboard tests
        run: deno task dashboard:test

  actions-sha-pinned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Check external actions are pinned to commit SHAs
        run: |
          # Match any uses: line whose ref is not a 40-char hex SHA
          if grep -rP '^\s+uses:\s+\S+@(?![0-9a-f]{40}\b)' .github/workflows/*.yml; then
            echo "ERROR: found action reference with a mutable tag — pin all external actions to a full commit SHA (see claim-actions-sha-pinned-001)" >&2
            exit 1
          fi
          echo "All external action references are SHA-pinned."
