id: 2da6b960-0b08-494b-95b6-6b21ee8f7e25
name: falsifier-sweep
description: Evaluate all falsifiers against current evidence. Five jobs run in parallel, one per falsifier. Records triggered/not-triggered state. Incident creation requires a rave/incident extension model (future work).
tags: {}
version: 1
jobs:
  - name: branch-protection-missing
    description: Evaluate falsifier-branch-protection-missing-001 against branch protection API evidence
    dependsOn: []
    weight: 0
    steps:
      - name: evaluate
        description: Check if branch protection policy is present
        allowFailure: true
        task:
          type: model_method
          modelIdOrName: falsifier-branch-protection-missing-001
          methodName: evaluate
          inputs:
            evidence:
              - evidenceId: "evidence-github-branch-protection-001"
                outcome: ${{ data.latest("evidence-github-branch-protection-001", "current").attributes.outcome }}
                timestamp: ${{ data.latest("evidence-github-branch-protection-001", "current").attributes.timestamp }}
                freshnessWindow: "PT1H"
                value: null
                rawData: ${{ data.latest("evidence-github-branch-protection-001", "current").attributes.rawData }}
