id: fd0aacde-a1bc-46d1-bd64-3b1a8c239263
name: confidence-decay-sweep
description: Recompute confidence scores for all active claims using current evidence state. Five jobs run in parallel, one per claim.
tags: {}
version: 1
jobs:
  - name: branch-protection
    description: Recompute confidence for claim-branch-protection-001
    dependsOn: []
    weight: 0
    steps:
      - name: compute
        description: Apply RAVE decay formula with latest branch-protection evidence
        allowFailure: true
        task:
          type: model_method
          modelIdOrName: confidence-claim-branch-protection-001
          methodName: compute
          inputs:
            currentScore: ${{ data.latest("confidence-claim-branch-protection-001", "current").attributes.confidenceScore }}
            lastValidated: ${{ data.latest("confidence-claim-branch-protection-001", "current").attributes.computedAt }}
            currentStatus: "active"
            evidence:
              - evidenceId: "evidence-github-branch-protection-001"
                outcome: ${{ data.latest("evidence-github-branch-protection-001", "latest").attributes.outcome }}
                timestamp: ${{ data.latest("evidence-github-branch-protection-001", "latest").attributes.timestamp }}
                freshnessWindow: "PT1H"
                qualityScore: 1.0
